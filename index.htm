<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keyboard Bahasa Sangihe</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    height:100dvh;
    overflow:hidden;
    background:#f0f2f5;
    font-family:sans-serif;
}

/* HEADER */
h2{
    margin:0;
    padding:6px;
    text-align:center;
}

/* EDITOR */
#editor{
    flex:1;
    position:relative;
    margin:6px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
    background:#fff;

    font-size:20px;
    white-space:pre-wrap;
    word-break:break-word;

    user-select:none;
}

/* caret */
#caret{
    position:absolute;
    width:2px;
    background:black;
    height:22px;
    animation:blink 1s step-end infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* selection */
.sel{
    background:rgba(77,171,247,0.35);
}

/* keyboard */
.keyboard{
    display:grid;
    gap:4px;
    margin:6px;
}

.row10{grid-template-columns:repeat(10,1fr);}

.key{
    height:42px;
    border:1px solid #ccc;
    border-radius:8px;
    background:#f8f9fa;
    font-weight:600;
}

</style>
</head>

<body>

<h2>Keyboard Bahasa Sangihe</h2>

<div id="editor"></div>
<div id="caret"></div>

<div class="keyboard">

<div class="row10">
<button class="key letter" data="q">q</button>
<button class="key letter" data="w">w</button>
<button class="key letter" data="e">e</button>
<button class="key letter" data="r">r</button>
<button class="key letter" data="t">t</button>
<button class="key letter" data="y">y</button>
<button class="key letter" data="u">u</button>
<button class="key letter" data="i">i</button>
<button class="key letter" data="o">o</button>
<button class="key letter" data="p">p</button>
</div>

</div>

<script>

/* =========================
   STATE
========================= */

let text = "";
let caret = 0;
let selStart = 0;
let selEnd = 0;

const editor = document.getElementById("editor");
const caretEl = document.getElementById("caret");

/* =========================
   RENDER
========================= */

function render(){

    editor.innerHTML = "";

    for(let i=0;i<text.length;i++){

        const span = document.createElement("span");
        span.textContent = text[i];

        if(i>=Math.min(selStart,selEnd) &&
           i<Math.max(selStart,selEnd)){
            span.className="sel";
        }

        editor.appendChild(span);
    }

    // caret
    const fake = document.createElement("span");
    fake.textContent="|";
    editor.appendChild(fake);

    const rect = fake.getBoundingClientRect();
    const er = editor.getBoundingClientRect();

    caretEl.style.left = (rect.left-er.left)+"px";
    caretEl.style.top = (rect.top-er.top)+"px";
}

/* =========================
   INSERT
========================= */

function insert(ch){

    if(selStart!==selEnd){
        deleteSelection();
    }

    text = text.slice(0,caret) + ch + text.slice(caret);
    caret += ch.length;

    selStart=selEnd=caret;
    render();
}

function deleteSelection(){

    const s=Math.min(selStart,selEnd);
    const e=Math.max(selStart,selEnd);

    text=text.slice(0,s)+text.slice(e);

    caret=s;
    selStart=selEnd=s;
}

/* =========================
   CLICK → CURSOR
========================= */

editor.addEventListener("click",(e)=>{

    const x=e.clientX;

    let sum=0;

    for(let i=0;i<text.length;i++){

        const span=document.createElement("span");
        span.textContent=text[i];

        editor.appendChild(span);
        const r=span.getBoundingClientRect();

        editor.removeChild(span);

        if(x<r.left+r.width/2){
            caret=i;
            selStart=selEnd=i;
            render();
            return;
        }

        sum=i;
    }

    caret=text.length;
    selStart=selEnd=caret;
    render();
});

/* =========================
   DRAG SELECTION
========================= */

let dragging=false;

editor.addEventListener("mousedown",e=>{
    dragging=true;
});

editor.addEventListener("mousemove",e=>{
    if(!dragging)return;

    const x=e.clientX;

    let best=0;

    for(let i=0;i<=text.length;i++){

        const test=document.createElement("span");
        test.textContent=(text[i]||" ");
        editor.appendChild(test);

        const r=test.getBoundingClientRect();
        editor.removeChild(test);

        if(x<r.left+r.width/2){
            best=i;
            break;
        }
        best=i;
    }

    selEnd=best;
    caret=best;
    render();
});

window.addEventListener("mouseup",()=>{
    dragging=false;
});

/* =========================
   PASTE SUPPORT
========================= */

editor.addEventListener("paste",(e)=>{
    e.preventDefault();

    const paste=(e.clipboardData||window.clipboardData).getData("text");

    insert(paste);
});

/* =========================
   IME SUPPORT (basic)
========================= */

editor.addEventListener("compositionend",(e)=>{
    insert(e.data);
});

/* =========================
   KEYBOARD (simple)
========================= */

document.querySelectorAll(".letter").forEach(b=>{
    b.onclick=()=>insert(b.dataset.data);
});

render();

</script>

</body>
</html>
