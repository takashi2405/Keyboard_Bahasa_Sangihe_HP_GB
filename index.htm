<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Bahasa Sangihe</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100dvh;
    display:flex;
    flex-direction:column;
    font-family:sans-serif;
}

/* EDITOR */
#editor{
    flex:1;
    margin:6px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
    overflow:auto;
    font-size:18px;
    word-break:break-word;
    white-space:pre-wrap;
}

/* KEYBOARD */
.keyboard{
    flex-shrink:0;   /* ★潰れ防止 */
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:6px;
    background:#eee;
}

/* ROW */
.row{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:4px;
}

/* KEY */
.key{
    height:42px;
    border:1px solid #bbb;
    border-radius:8px;
    background:#fff;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:10px;
    padding:4px;
    color:#666;
}

</style>
</head>

<body>

<div id="editor"></div>

<div class="keyboard">

<!-- ROW 1 -->
<div class="row">
<button class="key">1</button><button class="key">2</button><button class="key">3</button><button class="key">4</button><button class="key">5</button><button class="key">6</button><button class="key">7</button><button class="key">8</button><button class="key">9</button><button class="key">0</button>
</div>

<!-- ROW 2 -->
<div class="row">
<button class="key">q</button><button class="key">w</button><button class="key">e</button><button class="key">r</button><button class="key">t</button><button class="key">y</button><button class="key">u</button><button class="key">i</button><button class="key">o</button><button class="key">p</button>
</div>

<!-- ROW 3 -->
<div class="row">
<button class="key">a</button><button class="key">s</button><button class="key">d</button><button class="key">f</button><button class="key">g</button><button class="key">h</button><button class="key">j</button><button class="key">k</button><button class="key">l</button><button class="key">.</button>
</div>

<!-- ROW 4 -->
<div class="row">
<button class="key">z</button><button class="key">x</button><button class="key">c</button><button class="key">v</button><button class="key">b</button><button class="key">n</button><button class="key">m</button><button class="key">-</button><button class="key">=</button><button class="key">/</button>
</div>

<!-- ROW 5 -->
<div class="row">
<button class="key">Shift</button><button class="key">Caps</button><button class="key">Space</button><button class="key">⌫</button><button class="key">Enter</button><button class="key"></button><button class="key"></button><button class="key"></button><button class="key"></button><button class="key"></button>
</div>

</div>

<div class="footer">
© 2026 Takashi NAKAGAWA [0542]
</div>

</body>
</html>
