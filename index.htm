<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keyboard Bahasa Sangihe</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    height:100dvh;
    display:flex;
    flex-direction:column;
    font-family:sans-serif;
    background:#f0f2f5;
}

h2{
    margin:0;
    padding:6px;
    text-align:center;
}

/* EDITOR */
#editorWrap{
    flex:1;
    margin:6px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
    background:#fff;
    overflow:auto;

    font-size:20px;
    white-space:pre-wrap;
    word-break:break-word;

    position:relative;
}

.char{white-space:pre;}

#caret{
    position:absolute;
    width:2px;
    height:22px;
    background:black;
    animation:blink 1s step-end infinite;
}

@keyframes blink{50%{opacity:0;}}

/* KEYBOARD */
.keyboard{
    margin:6px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row10{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}

.key{
    height:42px;
    border:1px solid #ccc;
    border-radius:8px;
    background:#f8f9fa;
    font-weight:600;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:10px;
    color:#666;
    padding:4px 0 6px;
}

</style>
</head>

<body>

<h2>Keyboard Bahasa Sangihe</h2>

<div id="editorWrap"></div>
<div id="caret"></div>

<div class="keyboard">

<div class="row10">
<button class="key letter" data-l="q">q</button>
<button class="key letter" data-l="w">w</button>
<button class="key letter" data-l="e">e</button>
<button class="key letter" data-l="r">r</button>
<button class="key letter" data-l="t">t</button>
<button class="key letter" data-l="y">y</button>
<button class="key letter" data-l="u">u</button>
<button class="key letter" data-l="i">i</button>
<button class="key letter" data-l="o">o</button>
<button class="key letter" data-l="p">p</button>
</div>

</div>

<div class="footer">
© 2026 Takashi NAKAGAWA [0512]
</div>

<script>

let text="";
let caret=0;

const editor=document.getElementById("editorWrap");
const caretEl=document.getElementById("caret");

/* RENDER */
function render(){

    editor.innerHTML="";

    for(let i=0;i<=text.length;i++){

        const span=document.createElement("span");
        span.className="char";

        span.textContent = text[i] || "";
        if(i===text.length){
            span.id="anchor";
        }

        editor.appendChild(span);
    }

    const anchor=document.getElementById("anchor");
    const r=anchor.getBoundingClientRect();
    const er=editor.getBoundingClientRect();

    caretEl.style.left=(r.left-er.left+editor.scrollLeft)+"px";
    caretEl.style.top=(r.top-er.top+editor.scrollTop)+"px";
}

/* INSERT */
function insert(ch){
    text=text.slice(0,caret)+ch+text.slice(caret);
    caret++;
    render();
}

/* CLICK → CARET */
editor.addEventListener("click",(e)=>{

    const x=e.clientX;
    let best=0;

    for(let i=0;i<=text.length;i++){

        const temp=document.createElement("span");
        temp.textContent=text[i]||"";
        editor.appendChild(temp);

        const r=temp.getBoundingClientRect();
        editor.removeChild(temp);

        if(x<r.left+r.width/2){
            best=i;
            break;
        }
        best=i;
    }

    caret=best;
    render();
});

/* KEYBOARD */
document.querySelectorAll(".letter").forEach(b=>{
    b.onclick=()=>insert(b.dataset.l);
});

render();

</script>

</body>
</html>
