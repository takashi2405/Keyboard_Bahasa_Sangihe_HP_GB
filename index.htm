<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keyboard Bahasa Sangihe</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:#f0f2f5;
    font-family:sans-serif;
}

/* HEADER */
h2{
    margin:0;
    padding:6px;
    text-align:center;
    flex:0 0 auto;
}

/* EDITOR */
#editorWrap{
    position:relative;
    flex:1;
    margin:6px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
    background:#fff;
    overflow:auto;

    font-size:20px;
    white-space:pre-wrap;
    word-break:break-word;
}

#caret{
    position:absolute;
    width:2px;
    height:22px;
    background:black;
    animation:blink 1s step-end infinite;
}

@keyframes blink{50%{opacity:0;}}

/* KEYBOARD */
.keyboard{
    flex:0 0 auto;
    margin:6px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

/* 既存構造維持 */
.row{
    display:grid;
    gap:4px;
}

.row10{
    grid-template-columns:repeat(10,1fr);
}

.row6{
    grid-template-columns:1fr 1fr 2.2fr 0.8fr 1.4fr;
}

.key{
    height:42px;
    border:1px solid #cfd4da;
    border-radius:8px;
    background:#f8f9fa;
    font-weight:600;
}

.key:active{transform:scale(0.97);}

.special{
    background:#dee2e6;
}

/* FOOTER */
.footer{
    flex:0 0 auto;
    text-align:center;
    font-size:10px;
    color:#666;
    margin:4px 0 6px;
}

</style>
</head>

<body>

<h2>Keyboard Bahasa Sangihe</h2>

<div id="editorWrap"></div>
<div id="caret"></div>

<div class="keyboard">

<!-- ROW 1 -->
<div class="row row10">
<button class="key letter" data-l="́" data-u="~">́</button>
<button class="key letter" data-l="-" data-u="_">-</button>
<button class="key letter" data-l="=" data-u="+">=</button>
<button class="key letter" data-l="[" data-u="{">[</button>
<button class="key letter" data-l="]" data-u="}">]</button>
<button class="key letter" data-l="\" data-u="|">\</button>
<button class="key letter" data-l=";" data-u=":">;</button>
<button class="key letter" data-l="'" data-u='"'>'</button>
<button class="key letter" data-l="/" data-u="?">/</button>
<button class="key special" id="back">⌫</button>
</div>

<!-- ROW 2 -->
<div class="row row10">
<button class="key letter" data-l="1" data-u="!">1</button>
<button class="key letter" data-l="2" data-u="@">2</button>
<button class="key letter" data-l="3" data-u="#">3</button>
<button class="key letter" data-l="4" data-u="$">4</button>
<button class="key letter" data-l="5" data-u="%">5</button>
<button class="key letter" data-l="6" data-u="^">6</button>
<button class="key letter" data-l="7" data-u="&">7</button>
<button class="key letter" data-l="8" data-u="*">8</button>
<button class="key letter" data-l="9" data-u="(">9</button>
<button class="key letter" data-l="0" data-u=")">0</button>
</div>

<!-- ROW 3 -->
<div class="row row10">
<button class="key letter" data-l="q" data-u="Q">q</button>
<button class="key letter" data-l="w" data-u="W">w</button>
<button class="key letter" data-l="e" data-u="E">e</button>
<button class="key letter" data-l="r" data-u="R">r</button>
<button class="key letter" data-l="t" data-u="T">t</button>
<button class="key letter" data-l="y" data-u="Y">y</button>
<button class="key letter" data-l="u" data-u="U">u</button>
<button class="key letter" data-l="i" data-u="I">i</button>
<button class="key letter" data-l="o" data-u="O">o</button>
<button class="key letter" data-l="p" data-u="P">p</button>
</div>

<!-- ROW 4 -->
<div class="row row10">
<button class="key letter" data-l="a" data-u="A">a</button>
<button class="key letter" data-l="s" data-u="S">s</button>
<button class="key letter" data-l="ĕ" data-u="Ĕ">ĕ</button>
<button class="key letter" data-l="d" data-u="D">d</button>
<button class="key letter" data-l="f" data-u="F">f</button>
<button class="key letter" data-l="g" data-u="G">g</button>
<button class="key letter" data-l="h" data-u="H">h</button>
<button class="key letter" data-l="j" data-u="J">j</button>
<button class="key letter" data-l="k" data-u="K">k</button>
<button class="key letter" data-l="l" data-u="L">l</button>
</div>

<!-- ROW 5 -->
<div class="row row10">
<button class="key letter" data-l="̣" data-u="̣">◌&#803;</button>
<button class="key letter" data-l="z" data-u="Z">z</button>
<button class="key letter" data-l="x" data-u="X">x</button>
<button class="key letter" data-l="c" data-u="C">c</button>
<button class="key letter" data-l="v" data-u="V">v</button>
<button class="key letter" data-l="b" data-u="B">b</button>
<button class="key letter" data-l="n" data-u="N">n</button>
<button class="key letter" data-l="m" data-u="M">m</button>
<button class="key letter" data-l="l᷊" data-u="L᷊">l᷊</button>
<button class="key letter" data-l="," data-u="<">,</button>
</div>

<!-- ROW 6 -->
<div class="row row6">
<button class="key special" id="shift">Shift</button>
<button class="key special" id="caps">Caps</button>
<button class="key" id="space">Space</button>
<button class="key letter" data-l="." data-u=">">.</button>
<button class="key special" id="enter">Enter</button>
</div>

</div>

<div class="footer">
© 2026 Takashi NAKAGAWA [0500]
</div>

<script>

/* STATE */
let text="";
let caret=0;
let shift=false;
let caps=false;

const editor=document.getElementById("editorWrap");
const caretEl=document.getElementById("caret");

/* RENDER (SAFE) */
function render(){

    editor.textContent=text;

    const span=document.createElement("span");
    span.textContent="|";

    editor.appendChild(span);

    const r=span.getBoundingClientRect();
    const er=editor.getBoundingClientRect();

    caretEl.style.left=(r.left-er.left+editor.scrollLeft)+"px";
    caretEl.style.top=(r.top-er.top+editor.scrollTop)+"px";

    editor.removeChild(span);
}

/* INPUT */
function isUpper(){return shift||caps;}

function insert(ch){
    text=text.slice(0,caret)+ch+text.slice(caret);
    caret+=ch.length;
    shift=false;
    updateKeys();
    render();
}

function backspace(){
    if(caret>0){
        text=text.slice(0,caret-1)+text.slice(caret);
        caret--;
        render();
    }
}

/* KEYS */
function updateKeys(){
    document.querySelectorAll(".letter").forEach(b=>{
        b.textContent=isUpper()?b.dataset.u:b.dataset.l;
    });
}

/* EVENTS */
document.querySelectorAll(".letter").forEach(b=>{
    b.onclick=()=>insert(isUpper()?b.dataset.u:b.dataset.l);
});

document.getElementById("shift").onclick=()=>{
    shift=!shift;
    updateKeys();
};

document.getElementById("caps").onclick=()=>{
    caps=!caps;
    updateKeys();
};

document.getElementById("space").onclick=()=>insert(" ");
document.getElementById("enter").onclick=()=>insert("\n");
document.getElementById("back").onclick=backspace;

updateKeys();
render();

</script>

</body>
</html>
