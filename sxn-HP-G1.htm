<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gboard Style Editor</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    height:100dvh;
    overflow:hidden;
    background:#f0f2f5;
    font-family:"Noto Sans", Arial, sans-serif;
}

.container{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding:6px;
}

/* ===== EDITOR ===== */

#editorWrap{
    flex:1;
    position:relative;
    background:#fff;
    border:2px solid #ccd0d5;
    border-radius:10px;
    padding:10px;
    overflow:auto;
}

#textLayer{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:20px;
    line-height:1.4;
}

/* caret */
#caret{
    position:absolute;
    width:2px;
    height:22px;
    background:#000;
    animation:blink 1s step-end infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* ===== ACTIONS ===== */

.actions{
    display:flex;
    gap:5px;
    margin:6px 0;
}

button{
    flex:1;
    height:38px;
    border:none;
    border-radius:8px;
    font-weight:600;
}

#clear{background:#e9ecef;}
#copy{background:#4dabf7;color:#fff;}

/* ===== KEYBOARD ===== */

.keyboard{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row{
    display:grid;
    gap:4px;
}

.row10{
    grid-template-columns:repeat(10, 1fr);
}

.row6{
    grid-template-columns:1fr 1fr 2.2fr 0.8fr 1.4fr;
}

.key{
    height:42px;
    background:#f8f9fa;
    border:1px solid #cfd4da;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
}

.key:active{
    transform:scale(0.97);
}

.special{
    background:#dee2e6;
}

</style>
</head>

<body>

<div class="container">

<div id="editorWrap">
    <div id="textLayer"></div>
    <div id="caret"></div>
</div>

<div class="actions">
    <button id="clear">Hapus semua</button>
    <button id="copy">Salin semua</button>
</div>

<div class="keyboard">

<!-- ROW 1 -->
<div class="row row10">
<button class="key letter" data-low="́" data-upp="~">́</button>
<button class="key letter" data-low="-" data-upp="_">-</button>
<button class="key letter" data-low="=" data-upp="+">=</button>
<button class="key letter" data-low="[" data-upp="{">[</button>
<button class="key letter" data-low="]" data-upp="}">]</button>
<button class="key letter" data-low="\" data-upp="|">\</button>
<button class="key letter" data-low=";" data-upp=":">;</button>
<button class="key letter" data-low="'" data-upp='"'>'</button>
<button class="key letter" data-low="/" data-upp="?">/</button>
<button class="key special" id="back">⌫</button>
</div>

<!-- ROW 2 -->
<div class="row row10">
<button class="key letter" data-low="1" data-upp="!">1</button>
<button class="key letter" data-low="2" data-upp="@">2</button>
<button class="key letter" data-low="3" data-upp="#">3</button>
<button class="key letter" data-low="4" data-upp="$">4</button>
<button class="key letter" data-low="5" data-upp="%">5</button>
<button class="key letter" data-low="6" data-upp="^">6</button>
<button class="key letter" data-low="7" data-upp="&">7</button>
<button class="key letter" data-low="8" data-upp="*">8</button>
<button class="key letter" data-low="9" data-upp="(">9</button>
<button class="key letter" data-low="0" data-upp=")">0</button>
</div>

<!-- ROW 3 -->
<div class="row row10">
<button class="key letter" data-low="q" data-upp="Q">q</button>
<button class="key letter" data-low="w" data-upp="W">w</button>
<button class="key letter" data-low="e" data-upp="E">e</button>
<button class="key letter" data-low="r" data-upp="R">r</button>
<button class="key letter" data-low="t" data-upp="T">t</button>
<button class="key letter" data-low="y" data-upp="Y">y</button>
<button class="key letter" data-low="u" data-upp="U">u</button>
<button class="key letter" data-low="i" data-upp="I">i</button>
<button class="key letter" data-low="o" data-upp="O">o</button>
<button class="key letter" data-low="p" data-upp="P">p</button>
</div>

<!-- ROW 4 -->
<div class="row row10">
<button class="key letter" data-low="a" data-upp="A">a</button>
<button class="key letter" data-low="s" data-upp="S">s</button>
<button class="key letter" data-low="ĕ" data-upp="Ĕ">ĕ</button>
<button class="key letter" data-low="d" data-upp="D">d</button>
<button class="key letter" data-low="f" data-upp="F">f</button>
<button class="key letter" data-low="g" data-upp="G">g</button>
<button class="key letter" data-low="h" data-upp="H">h</button>
<button class="key letter" data-low="j" data-upp="J">j</button>
<button class="key letter" data-low="k" data-upp="K">k</button>
<button class="key letter" data-low="l" data-upp="L">l</button>
</div>

<!-- ROW 5 -->
<div class="row row10">
<button class="key letter" data-low="̣" data-upp="̣">◌&#803;</button>
<button class="key letter" data-low="z" data-upp="Z">z</button>
<button class="key letter" data-low="x" data-upp="X">x</button>
<button class="key letter" data-low="c" data-upp="C">c</button>
<button class="key letter" data-low="v" data-upp="V">v</button>
<button class="key letter" data-low="b" data-upp="B">b</button>
<button class="key letter" data-low="n" data-upp="N">n</button>
<button class="key letter" data-low="m" data-upp="M">m</button>
<button class="key letter" data-low="l᷊" data-upp="L᷊">l᷊</button>
<button class="key letter" data-low="," data-upp="<">,</button>
</div>

<!-- ROW 6 -->
<div class="row row6">

<button class="key special" id="shift">Shift</button>
<button class="key special" id="caps">Caps</button>
<button class="key" id="space">Space</button>
<button class="key letter" data-low="." data-upp=">">.</button>
<button class="key special" id="enter">Enter</button>

</div>

</div>

</div>

<script>

/* =========================
   STATE
========================= */

let text = "";
let caret = 0;
let shift = false;
let caps = false;

const layer = document.getElementById("textLayer");
const caretEl = document.getElementById("caret");
const wrap = document.getElementById("editorWrap");

/* =========================
   RENDER
========================= */

function render(){

    layer.textContent = text;

    const range = document.createRange();
    const sel = window.getSelection();

    // fake caret position
    const span = document.createElement("span");
    span.textContent = "|";

    const before = text.slice(0, caret);
    layer.textContent = before;

    layer.appendChild(span);
    layer.appendChild(document.createTextNode(text.slice(caret)));

    const rect = span.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();

    caretEl.style.left = (rect.left - wrapRect.left + wrap.scrollLeft) + "px";
    caretEl.style.top  = (rect.top - wrapRect.top + wrap.scrollTop) + "px";
}

/* =========================
   INPUT CORE
========================= */

function insertChar(ch){

    text = text.slice(0, caret) + ch + text.slice(caret);
    caret += ch.length;

    render();
}

function backspace(){

    if(caret>0){
        text = text.slice(0, caret-1) + text.slice(caret);
        caret--;
        render();
    }
}

/* =========================
   KEYS
========================= */

function isUpper(){ return shift || caps; }

function pressKey(btn){
    const ch = isUpper()?btn.dataset.upp:btn.dataset.low;
    insertChar(ch);
    shift=false;
}

/* =========================
   EVENTS
========================= */

document.querySelectorAll(".letter").forEach(b=>{
    b.onclick=()=>pressKey(b);
});

document.getElementById("back").onclick=backspace;

document.getElementById("clear").onclick=()=>{
    text=""; caret=0; render();
};

document.getElementById("copy").onclick=async()=>{
    await navigator.clipboard.writeText(text);
};

document.getElementById("shift").onclick=()=>{
    shift=!shift; render();
};

document.getElementById("caps").onclick=()=>{
    caps=!caps; render();
};

document.getElementById("enter").onclick=()=>{
    insertChar("\n");
};

document.getElementById("space").onclick=()=>{
    insertChar(" ");
};

render();

</script>

</body>
</html>
